[build-system]
requires = ["setuptools>=61"]
build-backend = "setuptools.build_meta"

[project]
name = "hammock-plot"
version = "0.1.0"
description = "Visualization of mixed categorical and numerical variables using hammock plots"
readme = "README.md"
license = {text = "MIT"}
requires-python = ">=3.6"

dependencies = [
    "numpy",
    "pandas",
    "matplotlib"
]
