name: Tests

on:
  pull_request:
  push:
    branches: [main]

jobs:
  integration-tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -m pip install pytest pillow ipython scipy

      - name: Run integration tests
        env:
          MPLBACKEND: Agg
        run: pytest tests/test_notebook_suite.py

      - name: Upload plot artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: plot-test-artifacts
          path: |
            test_suite/test_plots
            test_suite/diff_plots
